<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Ticket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Navbar -->
    <nav class="gradient-bg text-white px-8 py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3">
            <div class="bg-white bg-opacity-20 p-2 rounded-lg">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
            </div>
            <div>
                <h1 class="text-xl font-bold">Support CRM</h1>
                <p class="text-xs text-purple-200">Customer Support Management</p>
            </div>
        </div>
        <a href="/" class="bg-white bg-opacity-20 text-white font-semibold px-5 py-2 rounded-lg hover:bg-opacity-30 transition flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            Back
        </a>
    </nav>

    <div class="max-w-2xl mx-auto px-6 py-10">

        <!-- Header -->
        <div class="mb-8">
            <h2 class="text-2xl font-bold text-gray-800">Create New Ticket</h2>
            <p class="text-gray-500 text-sm mt-1">Fill in customer details to open a support ticket</p>
        </div>

        <!-- Form Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            <form action="/create" method="POST" class="space-y-6">

                <!-- Name + Email row -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            👤 Customer Name
                        </label>
                        <input
                            type="text"
                            name="customer_name"
                            required
                            placeholder="e.g. Rahul Sharma"
                            class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-400 text-sm transition"
                        />
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            📧 Customer Email
                        </label>
                        <input
                            type="email"
                            name="customer_email"
                            required
                            placeholder="e.g. rahul@email.com"
                            class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-400 text-sm transition"
                        />
                    </div>
                </div>

                <!-- Subject -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        📌 Issue Subject
                    </label>
                    <input
                        type="text"
                        name="subject"
                        required
                        placeholder="e.g. Unable to login to my account"
                        class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-400 text-sm transition"
                    />
                </div>

                <!-- Description -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        📝 Description
                    </label>
                    <textarea
                        name="description"
                        required
                        rows="5"
                        placeholder="Describe the issue in detail. Include steps to reproduce, error messages, etc..."
                        class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-400 text-sm transition resize-none"
                    ></textarea>
                </div>

                <!-- Priority -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        🚦 Priority
                    </label>
                    <div class="grid grid-cols-3 gap-3">
                        <label class="flex items-center gap-2 border border-gray-200 rounded-xl p-3 cursor-pointer hover:border-green-400 hover:bg-green-50 transition">
                            <input type="radio" name="priority" value="Low" class="text-green-500">
                            <span class="text-sm font-medium text-gray-700">🟢 Low</span>
                        </label>
                        <label class="flex items-center gap-2 border border-yellow-300 rounded-xl p-3 cursor-pointer bg-yellow-50 hover:border-yellow-400 transition">
                            <input type="radio" name="priority" value="Medium" checked class="text-yellow-500">
                            <span class="text-sm font-medium text-gray-700">🟡 Medium</span>
                        </label>
                        <label class="flex items-center gap-2 border border-gray-200 rounded-xl p-3 cursor-pointer hover:border-red-400 hover:bg-red-50 transition">
                            <input type="radio" name="priority" value="High" class="text-red-500">
                            <span class="text-sm font-medium text-gray-700">🔴 High</span>
                        </label>
                    </div>
                </div>

                <!-- Divider -->
                <div class="border-t border-gray-100"></div>

                <!-- Buttons -->
                <div class="flex gap-4">
                    <a href="/" class="flex-1 text-center border border-gray-200 text-gray-600 font-semibold py-3 rounded-xl hover:bg-gray-50 transition text-sm">
                        Cancel
                    </a>
                    <button type="submit" class="flex-1 gradient-bg text-white font-semibold py-3 rounded-xl hover:opacity-90 transition text-sm flex items-center justify-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        Create Ticket
                    </button>
                </div>

            </form>
        </div>

        <!-- Info box -->
        <div class="mt-6 bg-purple-50 border border-purple-100 rounded-2xl p-4 flex gap-3">
            <svg class="w-5 h-5 text-purple-500 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <p class="text-sm text-purple-700">A unique Ticket ID will be automatically generated. The ticket will be set to <strong>Open</strong> status by default.</p>
        </div>

    </div>

</body>
</html>
